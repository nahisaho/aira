appId: com.aira.desktop
productName: AIRA
copyright: Copyright © 2026

directories:
  output: dist-electron

files:
  - electron/dist/**/*
  - electron/preload.cjs
  - backend/dist/**/*
  - node_modules/**/*
  - "!node_modules/.cache"

asarUnpack:
  - "node_modules/sql.js/dist/sql-wasm.wasm"

extraResources:
  - from: frontend/dist
    to: frontend
  - from: skills
    to: skills

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [x64, arm64]

win:
  target:
    - target: nsis
      arch: [x64]

linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Development

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

npmRebuild: true
