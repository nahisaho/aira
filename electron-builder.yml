appId: com.aira.desktop
productName: AIRA
copyright: Copyright © 2026

directories:
  output: dist-electron

files:
  - electron/dist/**/*
  - backend/dist/**/*
  - node_modules/**/*
  - "!node_modules/.cache"

extraResources:
  - from: frontend/dist
    to: frontend
  - from: skills
    to: skills

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: aira-icons/icon.icns

win:
  target:
    - target: nsis
      arch: [x64]
  icon: aira-icons/icon.ico

linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: aira-icons
  category: Development

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: aira-icons/icon.ico

npmRebuild: true
